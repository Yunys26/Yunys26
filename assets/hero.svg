<svg width="1400" height="480" viewBox="0 0 1400 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb" cx="50%" cy="45%" r="62%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity=".55"/>
      <stop offset="45%" stop-color="#16a34a" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1400" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity=".05"/>
      <stop offset="45%" stop-color="#86efac" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity=".05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#22c55e" stroke-width=".7" opacity=".13"/>
    </pattern>
    <style>
      text{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace}
      .scan{animation:scan 6s linear infinite}
      .dash{stroke-dasharray:24 18;animation:dash 10s linear infinite}
      .float-a{animation:floatA 5s ease-in-out infinite}
      .float-b{animation:floatB 6.5s ease-in-out infinite}
      .pulse{animation:pulse 2.7s ease-in-out infinite}
      .cursor{animation:blink 1s steps(1) infinite}
      .orbit{transform-origin:700px 240px;animation:orbit 18s linear infinite}
      .orbit2{transform-origin:700px 240px;animation:orbit 26s linear infinite reverse}
      @keyframes scan{from{transform:translateY(-480px)}to{transform:translateY(480px)}}
      @keyframes dash{to{stroke-dashoffset:-520}}
      @keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
      @keyframes floatB{0%,100%{transform:translateX(0)}50%{transform:translateX(18px)}}
      @keyframes pulse{0%,100%{opacity:.48}50%{opacity:1}}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes orbit{to{transform:rotate(360deg)}}
    </style>
  </defs>

  <rect width="1400" height="480" rx="36" fill="#020617"/>
  <rect width="1400" height="480" rx="36" fill="url(#grid)"/>
  <circle cx="700" cy="230" r="360" fill="url(#orb)" class="pulse"/>
  <g class="scan" opacity=".17"><rect width="1400" height="105" fill="url(#line)"/></g>

  <path d="M60 355C230 175 390 405 560 270C745 123 865 148 995 250C1130 355 1225 342 1345 160" stroke="url(#line)" stroke-width="3" class="dash" filter="url(#glow)"/>
  <path d="M65 120C280 245 405 44 600 145C780 238 925 80 1110 135C1245 176 1300 210 1360 185" stroke="url(#line)" stroke-width="2" opacity=".55" class="dash"/>

  <g class="orbit" opacity=".65" filter="url(#glow)">
    <circle cx="700" cy="34" r="5" fill="#86efac"/>
    <circle cx="700" cy="446" r="5" fill="#22c55e"/>
  </g>
  <g class="orbit2" opacity=".45" filter="url(#glow)">
    <circle cx="462" cy="240" r="5" fill="#84cc16"/>
    <circle cx="938" cy="240" r="5" fill="#86efac"/>
  </g>

  <g transform="translate(62 80)">
    <rect width="315" height="258" rx="24" fill="#0f172a" stroke="#22c55e" stroke-opacity=".65"/>
    <rect x="22" y="22" width="271" height="38" rx="10" fill="#020617" stroke="#22c55e" stroke-opacity=".25"/>
    <circle cx="47" cy="41" r="5" fill="#ef4444"/><circle cx="68" cy="41" r="5" fill="#f59e0b"/><circle cx="89" cy="41" r="5" fill="#22c55e"/>
    <text x="24" y="96" fill="#86efac" font-size="15">$ whoami</text>
    <text x="24" y="130" fill="#ffffff" font-size="19" font-weight="900">Yunys Aliev</text>
    <text x="24" y="170" fill="#86efac" font-size="15">$ focus</text>
    <text x="24" y="200" fill="#ffffff" font-size="15">Telegram Bots</text>
    <text x="24" y="226" fill="#ffffff" font-size="15">Crypto Automation</text>
    <rect x="204" y="211" width="10" height="18" rx="2" fill="#22c55e" class="cursor"/>
  </g>

  <g text-anchor="middle">
    <text x="700" y="160" fill="#ffffff" font-size="66" font-weight="900" filter="url(#glow)">YUNYS ALIEV</text>
    <text x="700" y="210" fill="#86efac" font-size="22" font-weight="800">TypeScript Developer • Telegram Bots • Crypto Automation • AML Tools</text>
    <text x="700" y="252" fill="#d1fae5" font-size="18">I build systems that monitor, analyze, notify and automate.</text>
  </g>

  <g transform="translate(1018 80)">
    <rect width="320" height="258" rx="24" fill="#0f172a" stroke="#22c55e" stroke-opacity=".65"/>
    <text x="26" y="42" fill="#86efac" font-size="17" font-weight="900">MISSION STATUS</text>
    <text x="26" y="82" fill="#ffffff" font-size="14">Telegram Bot Factory</text><rect x="205" y="68" width="82" height="20" rx="10" fill="#14532d"/><text x="220" y="83" fill="#86efac" font-size="13" font-weight="900">ACTIVE</text>
    <text x="26" y="122" fill="#ffffff" font-size="14">USDT TRC20 Monitor</text><rect x="205" y="108" width="82" height="20" rx="10" fill="#14532d"/><text x="220" y="123" fill="#86efac" font-size="13" font-weight="900">ACTIVE</text>
    <text x="26" y="162" fill="#ffffff" font-size="14">AML Risk Engine</text><rect x="205" y="148" width="82" height="20" rx="10" fill="#14532d"/><text x="230" y="163" fill="#86efac" font-size="13" font-weight="900">DEV</text>
    <text x="26" y="202" fill="#ffffff" font-size="14">Docker Deploy</text><rect x="205" y="188" width="82" height="20" rx="10" fill="#14532d"/><text x="220" y="203" fill="#86efac" font-size="13" font-weight="900">READY</text>
  </g>

  <rect x="430" y="310" width="540" height="38" rx="10" fill="#020617" opacity=".86" stroke="#22c55e" stroke-opacity=".25"/>
  <text x="455" y="335" fill="#86efac" font-size="17">$ npm run build:production-automation</text>
  <rect x="910" y="318" width="10" height="20" rx="2" fill="#22c55e" class="cursor"/>

  <rect x="1" y="1" width="1398" height="478" rx="36" stroke="#22c55e" stroke-opacity=".35"/>
</svg>