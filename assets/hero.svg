.scan{animation:scan 6s linear infinite}.pulse{animation:pulse 3s ease-in-out infinite}.float{animation:float 6s ease-in-out infinite}.dash{stroke-dasharray:24 20;animation:dash 12s linear infinite}.cursor{animation:blink 1s steps(1) infinite}
@keyframes scan{from{transform:translateY(-460px)}to{transform:translateY(460px)}}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
@keyframes dash{to{stroke-dashoffset:-520}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
</style>
</defs>
