    <rect x="24" y="26" width="262" height="36" rx="10" fill="#020617" stroke="#22c55e" stroke-opacity=".25"/>
    <circle cx="48" cy="44" r="5" fill="#ef4444"/>
    <circle cx="68" cy="44" r="5" fill="#f59e0b"/>
    <circle cx="88" cy="44" r="5" fill="#22c55e"/>
    <text x="24" y="96" fill="#86efac" font-size="16">$ whoami</text>
    <text x="24" y="126" fill="#ffffff" font-size="18" font-weight="700">TypeScript Developer</text>
    <text x="24" y="168" fill="#86efac" font-size="16">$ focus</text>
    <text x="24" y="198" fill="#ffffff" font-size="16">bots • crypto • AML • web</text>
    <rect x="24" y="212" width="10" height="20" rx="2" fill="#22c55e" class="blink"/>
  </g>

  <g text-anchor="middle">
    <text x="700" y="150" fill="#ffffff" font-size="64" font-weight="900" filter="url(#glow)">YUNYS ALIEV</text>
    <text x="700" y="198" fill="#86efac" font-size="22" font-weight="700">TypeScript • Telegram Bots • Crypto Automation • AML Tools</text>
    <text x="700" y="240" fill="#cbd5e1" font-size="18">I build systems that monitor, analyze, notify and automate.</text>
  </g>

  <g transform="translate(1018 80)">
    <rect width="300" height="222" rx="24" fill="#0f172a" stroke="#22c55e" stroke-opacity=".55"/>
    <text x="26" y="42" fill="#86efac" font-size="17" font-weight="700">SYSTEM STATUS</text>
    <g font-size="15">
      <text x="26" y="82" fill="#ffffff">Telegram Bots</text>
      <rect x="176" y="68" width="88" height="20" rx="10" fill="#14532d"/>
      <text x="194" y="83" fill="#86efac" font-weight="700">ACTIVE</text>

      <text x="26" y="122" fill="#ffffff">USDT TRC20</text>
      <rect x="176" y="108" width="88" height="20" rx="10" fill="#14532d"/>
      <text x="194" y="123" fill="#86efac" font-weight="700">ACTIVE</text>

      <text x="26" y="162" fill="#ffffff">AML Checks</text>
      <rect x="176" y="148" width="88" height="20" rx="10" fill="#14532d"/>
      <text x="194" y="163" fill="#86efac" font-weight="700">BUILD</text>

      <text x="26" y="202" fill="#ffffff">Docker Deploy</text>
      <rect x="176" y="188" width="88" height="20" rx="10" fill="#14532d"/>
      <text x="194" y="203" fill="#86efac" font-weight="700">READY</text>
    </g>
  </g>

  <rect x="1" y="1" width="1398" height="418" rx="34" stroke="#22c55e" stroke-opacity=".35"/>
</svg>
