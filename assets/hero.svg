<radialGradient id="orb" cx="50%" cy="45%" r="70%"><stop offset="0%" stop-color="#22c55e" stop-opacity=".75"/><stop offset="45%" stop-color="#16a34a" stop-opacity=".18"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/></radialGradient>
