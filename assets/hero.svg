<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#16a34a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="1400" y2="420">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="55%" stop-color="#84cc16" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22c55e" stroke-width="0.6" opacity="0.16"/>
    </pattern>
    <style>
      .scan { animation: scan 5s linear infinite; }
      .float-a { animation: floatA 5.5s ease-in-out infinite; }
      .float-b { animation: floatB 7s ease-in-out infinite; }
      .pulse { animation: pulse 2.5s ease-in-out infinite; }
      .dash { stroke-dasharray: 18 16; animation: dash 10s linear infinite; }
      .blink { animation: blink 1.2s steps(1) infinite; }
      @keyframes scan { from { transform: translateY(-430px); } to { transform: translateY(430px); } }
      @keyframes floatA { 0%,100% { transform: translateY(0px); opacity: .7;} 50% { transform: translateY(-14px); opacity: 1;} }
      @keyframes floatB { 0%,100% { transform: translateX(0px); opacity: .45;} 50% { transform: translateX(18px); opacity: .9;} }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -340; } }
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect width="1400" height="420" rx="34" fill="#020617"/>
  <rect width="1400" height="420" rx="34" fill="url(#smallGrid)"/>
  <circle cx="700" cy="180" r="350" fill="url(#g1)" class="pulse"/>
  <path d="M60 320 C240 210, 360 390, 530 280 S840 110, 1020 210 S1210 330, 1340 160" stroke="url(#grid)" stroke-width="3" opacity=".75" class="dash" filter="url(#glow)"/>

  <g class="scan" opacity=".22">
    <rect x="0" y="0" width="1400" height="110" fill="url(#grid)"/>
  </g>

  <g opacity=".65" filter="url(#glow)">
    <circle cx="155" cy="100" r="4" fill="#22c55e" class="float-a"/>
    <circle cx="1260" cy="85" r="5" fill="#84cc16" class="float-b"/>
    <circle cx="1170" cy="310" r="4" fill="#22c55e" class="float-a"/>
    <circle cx="260" cy="320" r="5" fill="#84cc16" class="float-b"/>
    <circle cx="1020" cy="145" r="3" fill="#22c55e" class="float-a"/>
    <circle cx="445" cy="115" r="3" fill="#86efac" class="float-b"/>
  </g>

  <g transform="translate(82 76)">
