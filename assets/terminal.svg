      .bar2 { animation: load2 3.4s ease-in-out infinite; }
      .bar3 { animation: load3 4s ease-in-out infinite; }
      @keyframes blink { 0%,49%{opacity:1}50%,100%{opacity:0} }
      @keyframes load1 { 0%,100%{width:210px}50%{width:310px} }
      @keyframes load2 { 0%,100%{width:300px}50%{width:430px} }
      @keyframes load3 { 0%,100%{width:260px}50%{width:360px} }
    </style>
  </defs>
