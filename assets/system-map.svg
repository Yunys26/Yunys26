<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity=".2"/>
      <stop offset="50%" stop-color="#86efac" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity=".2"/>
    </linearGradient>
    <style>
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .node { fill:#0f172a; stroke:#22c55e; stroke-opacity:.72; }
      .line { stroke:url(#line); stroke-width:3; stroke-dasharray:16 16; animation: flow 9s linear infinite; filter:url(#glow); }
      .pulse { animation:pulse 2.6s ease-in-out infinite; }
      .pulse2 { animation:pulse 3.6s ease-in-out infinite; }
      @keyframes flow { to { stroke-dashoffset:-320; } }
      @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }
    </style>
  </defs>
  <rect width="1400" height="520" rx="30" fill="#020617"/>
  <g opacity=".18">
    <path d="M0 80H1400M0 160H1400M0 240H1400M0 320H1400M0 400H1400M0 480H1400" stroke="#22c55e"/>
    <path d="M100 0V520M250 0V520M400 0V520M550 0V520M700 0V520M850 0V520M1000 0V520M1150 0V520M1300 0V520" stroke="#22c55e"/>
  </g>

  <text x="700" y="58" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="900">BUILD MAP</text>
  <text x="700" y="92" text-anchor="middle" fill="#86efac" font-size="17">from idea to production system</text>

  <path class="line" d="M226 250 H414"/>
  <path class="line" d="M536 250 H724"/>
  <path class="line" d="M846 250 H1034"/>
  <path class="line" d="M700 315 V392"/>
  <path class="line" d="M380 315 C480 390, 570 412, 638 426"/>
  <path class="line" d="M1020 315 C920 390, 830 412, 762 426"/>

  <g transform="translate(86 178)" class="pulse">
    <rect class="node" width="140" height="144" rx="22"/>
    <text x="70" y="48" text-anchor="middle" fill="#ffffff" font-size="28">💡</text>
    <text x="70" y="86" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="800">IDEA</text>
    <text x="70" y="114" text-anchor="middle" fill="#86efac" font-size="13">problem first</text>
  </g>

  <g transform="translate(396 178)" class="pulse2">
    <rect class="node" width="140" height="144" rx="22"/>
    <text x="70" y="48" text-anchor="middle" fill="#ffffff" font-size="28">🧱</text>
    <text x="70" y="86" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="800">DESIGN</text>
    <text x="70" y="114" text-anchor="middle" fill="#86efac" font-size="13">types & flow</text>
  </g>

  <g transform="translate(706 178)" class="pulse">
    <rect class="node" width="140" height="144" rx="22"/>
    <text x="70" y="48" text-anchor="middle" fill="#ffffff" font-size="28">⚙️</text>
    <text x="70" y="86" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="800">BUILD</text>
    <text x="70" y="114" text-anchor="middle" fill="#86efac" font-size="13">services & APIs</text>
  </g>

  <g transform="translate(1016 178)" class="pulse2">
    <rect class="node" width="140" height="144" rx="22"/>
    <text x="70" y="48" text-anchor="middle" fill="#ffffff" font-size="28">🚀</text>
    <text x="70" y="86" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="800">SHIP</text>
    <text x="70" y="114" text-anchor="middle" fill="#86efac" font-size="13">docker deploy</text>
  </g>

