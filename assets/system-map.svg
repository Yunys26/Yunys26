    <text x="110" y="34" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="900">OBSERVE</text>
    <text x="110" y="58" text-anchor="middle" fill="#86efac" font-size="13">logs • metrics • alerts</text>
  </g>

  <rect x="1" y="1" width="1398" height="518" rx="30" stroke="#22c55e" stroke-opacity=".28"/>
